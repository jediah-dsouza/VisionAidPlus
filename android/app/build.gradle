apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def enableProguardInReleaseBuilds = false

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

react {
    autolinkLibrariesWithApp()
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.visionaidplus"

    defaultConfig {
        applicationId "com.visionaidplus"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        staging {
            storeFile file('staging.keystore')
            storePassword 'android'
            keyAlias 'stagingkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            signingConfig signingConfigs.debug
        }
        staging {
            applicationIdSuffix ".staging"
            versionNameSuffix "-staging"
            signingConfig signingConfigs.staging
            minifyEnabled false
        }
        release {
            signingConfig signingConfigs.staging
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    flavorDimensions += "environment"
    productFlavors {
        development {
            dimension "environment"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            buildConfigField "String", "ENVIRONMENT", "\"development\""
            buildConfigField "boolean", "MOCK_BLE_DEVICE", "true"
            buildConfigField "boolean", "MOCK_AI_DETECTION", "true"
        }
        stagingEnv {
            dimension "environment"
            buildConfigField "String", "ENVIRONMENT", "\"staging\""
            buildConfigField "boolean", "MOCK_BLE_DEVICE", "true"
            buildConfigField "boolean", "MOCK_AI_DETECTION", "true"
        }
        production {
            dimension "environment"
            buildConfigField "String", "ENVIRONMENT", "\"production\""
            buildConfigField "boolean", "MOCK_BLE_DEVICE", "false"
            buildConfigField "boolean", "MOCK_AI_DETECTION", "false"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

project.ext.react = [
    enableHermes: true
]